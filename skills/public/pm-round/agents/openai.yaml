display_name: PM Round
short_description: Post-merge cleanup, triage backlog when 10+ open (close lower-priority issues), review open issues/comments, propose new work as issues with label "PM" (max 3 per run); no code or PRs.
default_prompt: Run one PM round: (1) cleanup merged PRs—remove IN-PROGRESS and close linked issues; (2) if 10+ open issues, triage and close lower-priority ones; (3) review open issues and comment where needed; (4) read repo context and create up to 3 issues with label PM via gh (you decide how many). No code changes or PRs. Summarize results.
